<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ping XPHN Bot</title>
    <script>
function pingGlitch() {
    const glitchAppUrl = 'https://xphn-bot.glitch.me/';

fetch('https://xphn-bot.glitch.me/')
    .then(response => {
        if (!response.ok) {
            throw new Error('Network response was not ok');
        }
        return response.text(); // or response.json() if the response is JSON
    })
    .then(data => {
        console.log('Response data:', data);
    })
    .catch(error => {
        console.error('There has been a problem with your fetch operation:', error);
    });
    pingGlitch();
    </script>
</head>
<body>
    <p id="result">Pinging keep-alive...</p>
</body>
</html>
