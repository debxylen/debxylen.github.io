<head>

    <link rel="stylesheet" href="https://code.jquery.com/ui/1.14.0/themes/base/jquery-ui.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="icon" type="image/x-icon" href="klogo64.png">
</head>
<body>
    <header>
    <div class="header-content" style="text-align: center">
        <p style="font-size: 36px">Kishiren Repacks</p>
        <nav>
            <ul>

        </nav>
    </div>

    <div class="sidebar" style="position: absolute; height: 115 %">
        <a href="index.html"><p style="font-size: 30px">Kishiren Repacks</p></a>
        <ul>
            <li><a href="all.html">All Repacks</a></li>
            <li><a href="crypto.html">Send crypto to me</a></li>
        </ul>
        <div class="subs" style="bottom: 50px; position: absolute; float: bottom;">
        <p>Subscribe to my releases via email</p>
        <form>
            <input type="email" placeholder="Enter your email">
            <button type="submit" class="button-39">Subscribe</button>
        </form>
        </div>
    </div>
    <div class="main-content">
        <h1 style="font-size: 40px">All Repacks</h1>
    </div>
    <div class="popular-posts">
    <input type="text" id="searchInput" placeholder="Search for repacks" style="font-size: 20px; width: 90%;"><button onclick="searchRepack()" style="font-size: 20px; width: 8%;" class="button-39"><i class="fa fa-search"></i></button>
    </div>
    <div class="repackList" style="">
        <div class="posts"><a href="assettocorsa.html">Assetto Corsa 1.16.4 + CSP 0.2.4-preview1</a></div>
        <div class="posts"><a href="#">Need For Speed Heat</a></div>
        <div class="posts"></div>
        <div class="posts"></div>
    </div>
    <script>
    function searchRepack() {
    // Get the search input value
    const input = document.getElementById('searchInput').value.toLowerCase();

    // Get all posts
    const posts = document.querySelectorAll('.posts');

    // Loop through each post
    posts.forEach(post => {
        // If the post contains the search term, display it; otherwise, hide it
        if (post.textContent.toLowerCase().includes(input)) {
            post.style.display = 'block';
        } else {
            post.style.display = 'none';
        }
    });
    }

    // Event listener for "Enter" key
    document.getElementById('searchInput').addEventListener('keypress', function(event) {
    if (event.key === 'Enter') {
        searchRepack();
    }
    });

    </script>
